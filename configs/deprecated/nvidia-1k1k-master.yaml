        decode:
          num-worker: 1
          tp: 48
          ep: 48
          dp-attn: true

      # "Max throughput" (2 prefill workers at DEP8 and 1 decode worker at DEP32)
      - conc-list: [1024, 2048, 4096, 6144]
        prefill:
          num-worker: 2
          tp: 8
          ep: 8
          dp-attn: true
          additional-settings:
