# DeepSeek-R1-0528 FP4 8k/1k B200 dynamo-sglang disagg — MTP, 4P:1D (c2048)
# Topology: 4 prefill workers (TP4/EP4 dp-attn) + 1 decode worker (TP8/EP8 dp-attn) = 24 GPU.
# Dedicated high-concurrency tune:
#   SGLANG_HACK_SEQ_BOOTSTRAP_ROOM performance knob (not output-affecting; standard in GB200 recipes).
#   max-running-requests raised to 2048 to avoid admission throttle at high concurrency.
#   scheduler-recv-interval: 1 on decode.
#   symm-mem + allreduce fusion retained.
#   prefill stream-interval: 100; decode stream-interval: 34 (tuned for the c2048 batch cadence).
name: b200-fp4-dsr1_8k1k_mtp_4p1d_c2048
model:
  path: "dsr1"
  container: "lmsysorg/sglang:v0.5.12.post1"
  precision: fp4
resources:
  gpu_type: b200
  gpus_per_node: 8
  prefill_nodes: 2
  prefill_workers: 4
  gpus_per_prefill: 4
  decode_nodes: 1
  decode_workers: 1
frontend:
  type: dynamo
dynamo:
  hash: "5b4bc1dd70965017a737c71b19db5a0aeaa88727"
  install: true
backend:
  prefill_environment: &env
    TORCH_DISTRIBUTED_DEFAULT_TIMEOUT: '1800'
    PYTHONUNBUFFERED: '1'
    DYN_SKIP_SGLANG_LOG_FORMATTING: '1'
    DYN_REQUEST_PLANE: nats
    SGLANG_ENABLE_JIT_DEEPGEMM: 'false'
    SGLANG_DISAGGREGATION_HEARTBEAT_MAX_FAILURE: '100000'
    SGLANG_DISAGGREGATION_BOOTSTRAP_TIMEOUT: '100000'
    SGLANG_DISAGGREGATION_WAITING_TIMEOUT: '100000'
    SGLANG_MOONCAKE_CUSTOM_MEM_POOL: 'True'
    SGLANG_USE_MESSAGE_QUEUE_BROADCASTER: '0'
    SGLANG_DISABLE_TP_MEMORY_INBALANCE_CHECK: '1'
    SGLANG_PER_TOKEN_GROUP_QUANT_8BIT_V2: '1'
    SGLANG_ENABLE_SPEC_V2: '1'
    SGLANG_MOE_NVFP4_DISPATCH: '1'
    SGLANG_FLASHINFER_FP4_GEMM_BACKEND: cutlass
    MC_FORCE_MNNVL: '1'
    NCCL_MNNVL_ENABLE: '1'
    NCCL_CUMEM_ENABLE: '1'
    SGLANG_NCCL_ALL_GATHER_IN_OVERLAP_SCHEDULER_SYNC_BATCH: '1'
    SGLANG_HACK_SEQ_BOOTSTRAP_ROOM: '1'
  decode_environment: *env
  sglang_config:
    prefill:
      served-model-name: deepseek-ai/DeepSeek-R1
      trust-remote-code: true
      quantization: modelopt_fp4
      disaggregation-mode: prefill
      load-balance-method: round_robin
      disaggregation-transfer-backend: nixl
      mem-fraction-static: 0.85
      max-prefill-tokens: 32768
      chunked-prefill-size: 32768
      context-length: 9600
      max-running-requests: 2048
      disable-cuda-graph: true
      tensor-parallel-size: 4
      data-parallel-size: 4
      expert-parallel-size: 4
      enable-dp-attention: true
      enable-dp-lm-head: true
      attention-backend: trtllm_mla
      kv-cache-dtype: fp8_e4m3
      moe-runner-backend: flashinfer_trtllm
      moe-dense-tp-size: 1
      enable-flashinfer-allreduce-fusion: true
      enable-symm-mem: true
      disable-radix-cache: true
      stream-interval: 100
      watchdog-timeout: 1000000
    decode:
      served-model-name: deepseek-ai/DeepSeek-R1
      trust-remote-code: true
      quantization: modelopt_fp4
      disaggregation-mode: decode
      prefill-round-robin-balance: true
      disaggregation-transfer-backend: nixl
      mem-fraction-static: 0.75
      max-prefill-tokens: 32768
      chunked-prefill-size: 32768
      context-length: 9600
      max-running-requests: 2048
      cuda-graph-max-bs: 1024
      tensor-parallel-size: 8
      data-parallel-size: 8
      expert-parallel-size: 8
      enable-dp-attention: true
      enable-dp-lm-head: true
      attention-backend: trtllm_mla
      kv-cache-dtype: fp8_e4m3
      moe-runner-backend: flashinfer_trtllm
      moe-dense-tp-size: 1
      enable-flashinfer-allreduce-fusion: true
      enable-symm-mem: true
      disable-radix-cache: true
      stream-interval: 34
      scheduler-recv-interval: 1
      watchdog-timeout: 1000000
      speculative-algorithm: EAGLE
      speculative-num-steps: 2
      speculative-eagle-topk: 1
      speculative-num-draft-tokens: 3
health_check:
  max_attempts: 360
  interval_seconds: 10
benchmark:
  type: sa-bench
  req_rate: inf
  isl: 8192
  osl: 1024
  concurrencies: '2048'
  use_chat_template: true
