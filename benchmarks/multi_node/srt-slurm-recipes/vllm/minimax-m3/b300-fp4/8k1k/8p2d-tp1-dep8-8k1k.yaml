name: "minimax-m3-vllm-disagg-b300-8p2d-tp1-dep8-fp4-8k1k"
model:
  path: "nvidia/MiniMax-M3-NVFP4"
  container: "vllm/vllm-openai:nightly-2dfaae752b4db0d43cfc0715c780e33be030d0f1"
  precision: "fp4"
resources:
  gpu_type: "b300"
  gpus_per_node: 8
  prefill_nodes: 1
  decode_nodes: 2
  prefill_workers: 8
  decode_workers: 2
  gpus_per_prefill: 1
  gpus_per_decode: 8
dynamo:
  install: true
  version: 1.3.0.dev20260713
frontend:
  type: dynamo
  enable_multiple_frontends: false
backend:
  type: vllm
  connector:
  prefill_environment:
    VLLM_FLOAT32_MATMUL_PRECISION: high
    UCX_TLS: "cuda_copy,rc"
  decode_environment:
    VLLM_FLOAT32_MATMUL_PRECISION: high
    UCX_TLS: "cuda_copy,rc"
  vllm_config:
    prefill:
      no-enable-flashinfer-autotune: true
      tensor-parallel-size: 1
      enable-expert-parallel: false
      trust-remote-code: true
      no-enable-prefix-caching: true
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      attention-config: '{"backend": "FLASHINFER", "use_trtllm_attention": true, "indexer_kv_dtype": "fp8"}'
      kv-cache-dtype: fp8
      block-size: 128
      gpu-memory-utilization: 0.90
      max-model-len: 9472
      language-model-only: true
      stream-interval: 32
      enforce-eager: true
      max-num-batched-tokens: 8192
    decode:
      no-enable-flashinfer-autotune: true
      tensor-parallel-size: 1
      data-parallel-size: 8
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      trust-remote-code: true
      no-enable-prefix-caching: true
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      attention-config: '{"backend": "FLASHINFER", "use_trtllm_attention": true, "indexer_kv_dtype": "fp8"}'
      kv-cache-dtype: fp8
      block-size: 128
      gpu-memory-utilization: 0.90
      max-model-len: 9472
      language-model-only: true
      stream-interval: 32
      max-num-seqs: 1024
      max-num-batched-tokens: 16384
      max-cudagraph-capture-size: 4096
health_check:
  max_attempts: 360
  interval_seconds: 10
benchmark:
  type: "sa-bench"
  isl: 8192
  osl: 1024
  concurrencies: "768x1024"
  req_rate: "inf"
